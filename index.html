<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020514;
      font-family: Arial, sans-serif;
    }

    .landing {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url("telegram.jpg");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .telegram-float {
      position: fixed;
      left: 40px;
      top: 40px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2aabee, #0088cc, #7b2cff);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow:
        0 0 22px #00c6ff,
        0 0 55px rgba(0, 198, 255, 0.9),
        inset 0 0 18px rgba(255,255,255,0.4);
      border: 3px solid rgba(255,255,255,0.85);
      z-index: 20;
      cursor: pointer;
      animation: pulseGlow 1.8s ease-in-out infinite;
    }

    .telegram-float::before {
      content: "";
      position: absolute;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: 2px solid rgba(0,198,255,0.55);
      animation: ringPulse 2s infinite;
    }

    .telegram-logo {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #229ed9;
      font-size: 34px;
      font-weight: 900;
      padding-right: 3px;
      box-shadow: 0 0 18px rgba(255,255,255,0.9);
      z-index: 2;
    }

    .label {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: white;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 0 10px #000;
      z-index: 9;
      white-space: nowrap;
    }

    .notice {
      position: absolute;
      left: 50%;
      bottom: 9px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.78);
      font-size: 11px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #000;
      z-index: 9;
      white-space: nowrap;
    }

    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #00c6ff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 0 12px #00c6ff;
      animation: explode 700ms ease-out forwards;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow:
          0 0 22px #00c6ff,
          0 0 55px rgba(0, 198, 255, 0.9),
          inset 0 0 18px rgba(255,255,255,0.4);
      }
      50% {
        box-shadow:
          0 0 36px #00c6ff,
          0 0 85px rgba(0, 198, 255, 1),
          inset 0 0 24px rgba(255,255,255,0.55);
      }
    }

    @keyframes ringPulse {
      0% { transform: scale(0.85); opacity: 0.95; }
      100% { transform: scale(1.25); opacity: 0; }
    }

    @keyframes explode {
      from { transform: translate(0, 0) scale(1); opacity: 1; }
      to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
    }

    @media (max-width: 480px) {
      .telegram-float { width: 74px; height: 74px; }
      .telegram-logo { width: 42px; height: 42px; font-size: 28px; }
      .telegram-float::before { width: 96px; height: 96px; }
      .label { font-size: 11px; }
      .notice { font-size: 9px; }
    }
  </style>
</head>

<body>
  <main class="landing">
    <a class="telegram-float"
       id="telegramButton"
       href="https://t.me/red_corona_asistente_bot?start=meta"
       target="_blank"
       aria-label="Ingresar por Telegram">
      <div class="telegram-logo">➤</div>
    </a>

    <div class="label">TOCÁ EL LOGO PARA INGRESAR</div>
    <div class="notice">+18 · ENTRETENIMIENTO RESPONSABLE</div>
  </main>

  <script>
    const button = document.getElementById("telegramButton");

    let x = 40;
    let y = 40;
    let dx = 1.2;
    let dy = 1.1;

    function moveButton() {
      const buttonSize = button.offsetWidth;
      const maxX = window.innerWidth - buttonSize;
      const maxY = window.innerHeight - buttonSize;

      x += dx;
      y += dy;

      if (x <= 0 || x >= maxX) dx *= -1;
      if (y <= 0 || y >= maxY) dy *= -1;

      button.style.left = x + "px";
      button.style.top = y + "px";

      requestAnimationFrame(moveButton);
    }

    moveButton();

    button.addEventListener("click", function(event) {
      if (typeof fbq === "function") {
        fbq("track", "Lead");
        fbq("trackCustom", "TelegramClick");
      }

      createExplosion(event.clientX, event.clientY);
    });

    function createExplosion(centerX, centerY) {
      for (let i = 0; i < 22; i++) {
        const particle = document.createElement("span");
        particle.className = "particle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 45 + Math.random() * 75;

        particle.style.left = centerX + "px";
        particle.style.top = centerY + "px";
        particle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        particle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        document.body.appendChild(particle);

        setTimeout(() => {
          particle.remove();
        }, 750);
      }
    }
  </script>
</body>
</html>
