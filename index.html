<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Corona Bett</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #020514;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .landing {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background-image: url("fondo.JEPG");
      background-size: cover;
      background-position: center top;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 0 22px 38px;
    }

    .telegram-btn {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, #00c6ff, #0072ff, #8a2be2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow:
        0 0 18px #00c6ff,
        0 0 42px rgba(0, 198, 255, 0.75),
        inset 0 0 14px rgba(255, 255, 255, 0.35);
      border: 2px solid rgba(255,255,255,0.65);
      animation: pulse 1.8s infinite;
      overflow: hidden;
    }

    .telegram-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -80%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent
      );
      animation: shine 2.4s infinite;
    }

    .telegram-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #229ed9;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(255,255,255,0.9);
    }

    .telegram-text {
      z-index: 2;
    }

    .notice {
      margin-top: 16px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #000;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.045);
      }
    }

    @keyframes shine {
      0% {
        left: -80%;
      }
      100% {
        left: 130%;
      }
    }

    @media (max-height: 700px) {
      .landing {
        padding-bottom: 24px;
      }

      .telegram-btn {
        height: 64px;
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <main class="landing">
    <a class="telegram-btn" href="https://t.me/Eliamcorona" target="_blank">
      <div class="telegram-icon">➤</div>
      <div class="telegram-text">INGRESAR POR TELEGRAM</div>
    </a>

    <div class="notice">+18 · ENTRETENIMIENTO RESPONSABLE</div>
  </main>
</body>
</html>
